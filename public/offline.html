<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1A2856" />
    <title>Brak połączenia - Testownik Solvro</title>
    <style>
      :root {
        color-scheme: light dark;
        --background: oklch(1 0 0);
        --foreground: oklch(0.2044 0.0215 263.92);
        --card: oklch(0.99 0 286.38);
        --card-foreground: oklch(0.253 0.0321 265.95);
        --muted-foreground: oklch(0.437 0.0638 260.33);
        --input: oklch(0.9597 0.0052 247.88);
        --border: oklch(0.8689 0.0358 258.87);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: oklch(0.177 0.025 262.114);
          --foreground: oklch(0.985 0 0);
          --card: oklch(0.1877 0.0283 264.85);
          --card-foreground: oklch(0.985 0 0);
          --muted-foreground: oklch(0.708 0 0);
          --input: oklch(0.82 0.084 261.375 / 15%);
          --border: oklch(0.82 0.084 261.375 / 10%);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family:
          "Hanken Grotesk",
          system-ui,
          -apple-system,
          sans-serif;
        background: var(--background);
        color: var(--foreground);
      }

      .page {
        display: flex;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .card {
        width: 100%;
        max-width: 42rem;
        border-radius: 0.75rem;
        background: var(--card);
        color: var(--card-foreground);
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
        outline: 1px solid
          color-mix(in oklch, var(--foreground) 10%, transparent);
      }

      .card-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        padding: 3rem 1.5rem;
        text-align: center;
      }

      .text-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .icon {
        width: 3rem;
        height: 3rem;
        color: var(--muted-foreground);
      }

      .title {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.025em;
      }

      .description {
        margin: 0;
        max-width: 28rem;
        font-size: 0.875rem;
        line-height: 1.5;
        color: var(--muted-foreground);
      }

      .button {
        display: inline-flex;
        height: 2.5rem;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--input);
        padding: 0.625rem 1rem;
        font: inherit;
        font-size: 1rem;
        color: inherit;
        text-decoration: none;
      }

      @media (prefers-color-scheme: dark) {
        .button {
          border: 0;
        }
      }

      .button-icon {
        width: 1rem;
        height: 1rem;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article class="card">
        <div class="card-content">
          <svg
            class="icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 20h.01" />
            <path d="M8.5 16.429a5 5 0 0 1 7 0" />
            <path d="M5 12.859a10 10 0 0 1 5.17-2.69" />
            <path d="M19 12.859a10 10 0 0 0-2.007-1.523" />
            <path d="M2 8.82a15 15 0 0 1 4.177-2.643" />
            <path d="M22 8.82a15 15 0 0 0-11.288-3.764" />
            <path d="m2 2 20 20" />
          </svg>
          <div class="text-group">
            <h1 class="title">Brak połączenia z internetem</h1>
            <p class="description">
              Testownik wymaga połączenia z siecią. Sprawdź połączenie i spróbuj
              ponownie.
            </p>
          </div>
          <a class="button" href="/">
            <svg
              class="button-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
              <path d="M21 3v5h-5" />
              <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
              <path d="M8 16H3v5" />
            </svg>
            Spróbuj ponownie
          </a>
        </div>
      </article>
    </main>
  </body>
</html>
